<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>wsg.tv</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a; --surface: #111; --surface2: #181818; --border: #222;
      --accent: #00ff88; --accent2: #ff2d55; --text: #f0f0f0; --muted: #555; --muted2: #888;
      --font-display: 'Syne', sans-serif; --font-mono: 'Space Mono', monospace;
      --panel-width: 340px;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-display); overflow: hidden; }
    #app { display: flex; height: 100vh; width: 100vw; position: relative; }
    #feed { flex: 1; position: relative; overflow: hidden; background: #000; transition: margin-right 0.4s cubic-bezier(0.77,0,0.175,1); }
    #feed.panel-open { margin-right: var(--panel-width); }
    .video-slide { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; transition: transform 0.45s cubic-bezier(0.77,0,0.175,1), opacity 0.45s ease; }
    .video-slide.active  { transform: translateY(0);    opacity: 1; z-index: 2; }
    .video-slide.above   { transform: translateY(-100%); opacity: 0; z-index: 1; }
    .video-slide.below   { transform: translateY(100%);  opacity: 0; z-index: 1; }
    .video-slide.entering-from-bottom { transform: translateY(100%);  opacity: 0; z-index: 3; }
    .video-slide.entering-from-top    { transform: translateY(-100%); opacity: 0; z-index: 3; }
    .video-slide video { max-width: 100%; max-height: 100vh; width: auto; height: 100%; object-fit: contain; display: block; }
    .video-info { position: absolute; bottom: 0; left: 0; right: 0; padding: 20px 24px 32px; background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%); z-index: 10; }
    .video-filename { font-family: var(--font-mono); font-size: 11px; color: rgba(255,255,255,0.45); letter-spacing: 0.04em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 85%; }
    .video-postno { font-family: var(--font-mono); font-size: 10px; color: var(--accent); opacity: 0.7; margin-top: 4px; letter-spacing: 0.06em; }
    #panel { position: absolute; top: 0; right: 72px; bottom: 0; width: var(--panel-width); background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; z-index: 25; transform: translateX(calc(var(--panel-width) + 72px)); transition: transform 0.4s cubic-bezier(0.77,0,0.175,1); }
    #panel.open { transform: translateX(0); }
    .panel-header { padding: 20px 20px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .panel-title { font-weight: 800; font-size: 13px; letter-spacing: 0.06em; display: flex; align-items: center; gap: 8px; }
    .reply-count { font-family: var(--font-mono); font-size: 10px; background: var(--border); padding: 2px 7px; border-radius: 20px; color: var(--muted2); }
    .panel-close { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; line-height: 1; padding: 2px 6px; transition: color 0.2s; }
    .panel-close:hover { color: var(--text); }
    .thread-link-bar { margin: 12px 16px; padding: 10px 14px; border: 1px solid var(--border); border-radius: 6px; display: flex; align-items: center; justify-content: space-between; background: var(--surface2); flex-shrink: 0; text-decoration: none; transition: border-color 0.2s; }
    .thread-link-bar:hover { border-color: var(--accent); }
    .thread-link-label { font-family: var(--font-mono); font-size: 10px; color: var(--muted2); letter-spacing: 0.06em; }
    .thread-link-arrow { font-size: 14px; color: var(--accent); }
    #replies-list { flex: 1; overflow-y: auto; padding: 8px 0 16px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
    #replies-list::-webkit-scrollbar { width: 4px; }
    #replies-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .reply-item { padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.04); animation: fadeSlideIn 0.3s ease both; }
    @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .reply-meta { font-family: var(--font-mono); font-size: 9px; color: var(--muted); letter-spacing: 0.05em; margin-bottom: 6px; }
    .reply-meta span { color: var(--accent); opacity: 0.8; }
    .reply-text { font-size: 13px; line-height: 1.6; color: rgba(255,255,255,0.75); white-space: pre-wrap; word-break: break-word; }
    .no-replies { padding: 32px 20px; text-align: center; font-family: var(--font-mono); font-size: 11px; color: var(--muted); letter-spacing: 0.06em; line-height: 1.8; }
    .panel-loading { display: flex; align-items: center; justify-content: center; padding: 40px; gap: 12px; flex-direction: column; }
    .panel-spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .panel-spinner-text { font-family: var(--font-mono); font-size: 10px; color: var(--muted); }
    #sidebar { width: 72px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 28px 0; background: var(--surface); border-left: 1px solid var(--border); z-index: 30; }
    .logo { font-family: var(--font-display); font-weight: 800; font-size: 13px; letter-spacing: 0.08em; color: var(--accent); writing-mode: vertical-rl; text-orientation: mixed; transform: rotate(180deg); user-select: none; }
    .sidebar-actions { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .btn { width: 44px; height: 44px; border-radius: 50%; border: 1px solid var(--border); background: transparent; color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s, border-color 0.2s, transform 0.15s; font-size: 18px; }
    .btn:hover { background: rgba(255,255,255,0.07); border-color: var(--accent); transform: scale(1.08); }
    .btn:active { transform: scale(0.95); }
    .btn.primary { background: var(--accent); border-color: var(--accent); color: #000; font-size: 20px; }
    .btn.primary:hover { background: #00ffaa; border-color: #00ffaa; }
    .btn.active-btn { border-color: var(--accent); background: rgba(0,255,136,0.1); }
    .btn-label { font-family: var(--font-mono); font-size: 9px; color: var(--muted); letter-spacing: 0.05em; text-align: center; margin-top: -2px; }
    .btn-group { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    #loader { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--bg); z-index: 50; gap: 20px; transition: opacity 0.4s ease; }
    #loader.hidden { opacity: 0; pointer-events: none; }
    .spinner { width: 36px; height: 36px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    .loader-text { font-family: var(--font-mono); font-size: 11px; color: var(--muted); letter-spacing: 0.1em; }
    #toast { position: absolute; top: 20px; left: 50%; transform: translateX(-50%) translateY(-80px); background: var(--accent2); color: #fff; font-family: var(--font-mono); font-size: 11px; padding: 10px 20px; border-radius: 4px; z-index: 60; transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); white-space: nowrap; }
    #toast.show { transform: translateX(-50%) translateY(0); }
    #mute-badge { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); border: 1px solid var(--border); border-radius: 4px; padding: 5px 10px; font-family: var(--font-mono); font-size: 10px; color: var(--muted); z-index: 10; letter-spacing: 0.06em; pointer-events: none; transition: opacity 0.3s; }
    #mute-badge.hidden { opacity: 0; }
    #progress-bar { position: absolute; bottom: 0; left: 0; height: 2px; background: var(--accent); width: 0%; z-index: 15; transition: width 0.1s linear; }
    .nav-hint { position: absolute; right: 84px; display: flex; flex-direction: column; gap: 8px; z-index: 10; top: 50%; transform: translateY(-50%); }
    .nav-arrow { width: 36px; height: 36px; border: 1px solid rgba(255,255,255,0.15); border-radius: 50%; background: rgba(0,0,0,0.4); backdrop-filter: blur(6px); color: rgba(255,255,255,0.6); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: border-color 0.2s, color 0.2s; }
    .nav-arrow:hover { border-color: var(--accent); color: var(--accent); }
  </style>
</head>
<body>
<div id="app">
  <div id="loader"><div class="spinner"></div><div class="loader-text">FETCHING /WSG/</div></div>
  <div id="feed">
    <div id="mute-badge">MUTED</div>
    <div id="progress-bar"></div>
    <div class="nav-hint">
      <button class="nav-arrow" id="btn-up">▲</button>
      <button class="nav-arrow" id="btn-down">▼</button>
    </div>
  </div>
  <div id="panel">
    <div class="panel-header">
      <div class="panel-title">REPLIES <span class="reply-count" id="reply-count">0</span></div>
      <button class="panel-close" id="btn-panel-close">✕</button>
    </div>
    <a id="thread-link" class="thread-link-bar" href="#" target="_blank" rel="noopener">
      <span class="thread-link-label">OPEN THREAD TO REPLY ↗</span>
      <span class="thread-link-arrow">→</span>
    </a>
    <div id="replies-list">
      <div class="panel-loading"><div class="panel-spinner"></div><div class="panel-spinner-text">LOADING</div></div>
    </div>
  </div>
  <div id="sidebar">
    <div class="logo">wsg.tv</div>
    <div class="sidebar-actions">
      <div class="btn-group"><button class="btn primary" id="btn-next">↓</button><span class="btn-label">NEXT</span></div>
      <div class="btn-group"><button class="btn" id="btn-replies">💬</button><span class="btn-label">REPLIES</span></div>
      <div class="btn-group"><button class="btn" id="btn-mute">🔇</button><span class="btn-label">MUTE</span></div>
      <div class="btn-group"><button class="btn" id="btn-open">↗</button><span class="btn-label">OPEN</span></div>
    </div>
    <div></div>
  </div>
</div>
<div id="toast"></div>
<script>
  const API = '/api/random-video';
  let currentVideo = null, activeSlide = null, muted = true, panelOpen = false, isTransitioning = false, preloaded = null;

  const feed = document.getElementById('feed');
  const panel = document.getElementById('panel');
  const loader = document.getElementById('loader');
  const toast = document.getElementById('toast');
  const muteBadge = document.getElementById('mute-badge');
  const progressBar = document.getElementById('progress-bar');
  const repliesList = document.getElementById('replies-list');
  const replyCount = document.getElementById('reply-count');
  const threadLink = document.getElementById('thread-link');
  const btnReplies = document.getElementById('btn-replies');

  function showToast(msg, dur = 3000) {
    toast.textContent = msg; toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), dur);
  }

  function escapeHTML(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function renderReplies(data) {
    if (!data) return;
    threadLink.href = data.thread_url || '#';
    const replies = data.replies || [];
    replyCount.textContent = replies.length;
    if (replies.length === 0) {
      repliesList.innerHTML = `<div class="no-replies">NO REPLIES YET<br/><span style="color:var(--muted2);font-size:10px">BE THE FIRST TO REPLY</span></div>`;
      return;
    }
    repliesList.innerHTML = replies.map((r, i) => `
      <div class="reply-item" style="animation-delay:${i*40}ms">
        <div class="reply-meta">POST <span>#${r.post_no}</span></div>
        <div class="reply-text">${escapeHTML(r.text)}</div>
      </div>`).join('');
  }

  function openPanel() {
    panelOpen = true; panel.classList.add('open'); feed.classList.add('panel-open');
    btnReplies.classList.add('active-btn'); renderReplies(activeSlide?.data);
  }
  function closePanel() {
    panelOpen = false; panel.classList.remove('open'); feed.classList.remove('panel-open');
    btnReplies.classList.remove('active-btn');
  }
  function togglePanel() { panelOpen ? closePanel() : openPanel(); }

  async function fetchVideo() {
    const res = await fetch(API);
    if (!res.ok) throw new Error('API error');
    return await res.json();
  }

  function createSlide(data) {
    const slide = document.createElement('div');
    slide.className = 'video-slide below';
    const video = document.createElement('video');
    video.src = data.url; video.loop = true; video.muted = muted; video.playsInline = true; video.preload = 'auto';
    const info = document.createElement('div');
    info.className = 'video-info';
    info.innerHTML = `<div class="video-filename">${data.filename || data.url.split('/').pop()}</div>
      <div class="video-postno">No.${data.post_no} · ${(data.replies||[]).length} repl${(data.replies||[]).length===1?'y':'ies'}</div>`;
    slide.appendChild(video); slide.appendChild(info); feed.appendChild(slide);
    return { slide, video, data };
  }

  async function transitionTo(newSlide, direction = 'up') {
    if (isTransitioning) return;
    isTransitioning = true;
    const enterClass = direction === 'up' ? 'entering-from-bottom' : 'entering-from-top';
    newSlide.slide.classList.remove('above','below','active');
    newSlide.slide.classList.add(enterClass);
    newSlide.slide.getBoundingClientRect();
    if (activeSlide) {
      activeSlide.slide.classList.remove('active');
      activeSlide.slide.classList.add(direction === 'up' ? 'above' : 'below');
      activeSlide.video.pause();
    }
    newSlide.slide.classList.remove(enterClass);
    newSlide.slide.classList.add('active');
    currentVideo = newSlide.video;
    currentVideo.muted = muted;
    try { await currentVideo.play(); } catch {
      currentVideo.muted = true; muted = true; updateMuteBadge();
      await currentVideo.play().catch(()=>{});
    }
    activeSlide = newSlide;
    trackProgress();
    if (panelOpen) renderReplies(newSlide.data);
    setTimeout(() => { isTransitioning = false; }, 500);
  }

  let progressInterval = null;
  function trackProgress() {
    if (progressInterval) clearInterval(progressInterval);
    progressBar.style.width = '0%';
    progressInterval = setInterval(() => {
      if (!currentVideo || !currentVideo.duration) return;
      progressBar.style.width = ((currentVideo.currentTime / currentVideo.duration) * 100) + '%';
    }, 100);
  }

  async function preloadNext() {
    try { const data = await fetchVideo(); preloaded = createSlide(data); } catch { preloaded = null; }
  }

  async function nextVideo() {
    if (isTransitioning) return;
    loader.classList.remove('hidden');
    let next;
    if (preloaded) {
      next = preloaded; preloaded = null; loader.classList.add('hidden');
    } else {
      try { const data = await fetchVideo(); next = createSlide(data); loader.classList.add('hidden'); }
      catch { loader.classList.add('hidden'); showToast('Failed to fetch — is the server running?'); return; }
    }
    await transitionTo(next, 'up');
    const all = feed.querySelectorAll('.video-slide');
    if (all.length > 3) all[0].remove();
    preloadNext();
  }

  function updateMuteBadge() {
    muteBadge.classList.toggle('hidden', !muted);
    document.getElementById('btn-mute').textContent = muted ? '🔇' : '🔊';
  }
  function toggleMute() {
    muted = !muted; if (currentVideo) currentVideo.muted = muted; updateMuteBadge();
  }
  function openCurrent() { if (activeSlide) window.open(activeSlide.data.url, '_blank'); }

  document.getElementById('btn-next').addEventListener('click', nextVideo);
  document.getElementById('btn-replies').addEventListener('click', togglePanel);
  document.getElementById('btn-mute').addEventListener('click', toggleMute);
  document.getElementById('btn-open').addEventListener('click', openCurrent);
  document.getElementById('btn-panel-close').addEventListener('click', closePanel);
  document.getElementById('btn-up').addEventListener('click', nextVideo);
  document.getElementById('btn-down').addEventListener('click', nextVideo);

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); nextVideo(); }
    if (e.key === 'ArrowUp') { e.preventDefault(); nextVideo(); }
    if (e.key === 'm' || e.key === 'M') toggleMute();
    if (e.key === 'o' || e.key === 'O') openCurrent();
    if (e.key === 'r' || e.key === 'R') togglePanel();
    if (e.key === 'Escape') closePanel();
  });

  let touchStartY = 0;
  feed.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, { passive: true });
  feed.addEventListener('touchend', e => { if (Math.abs(touchStartY - e.changedTouches[0].clientY) > 50) nextVideo(); }, { passive: true });

  let wheelCooldown = false;
  feed.addEventListener('wheel', e => {
    if (wheelCooldown) return; wheelCooldown = true; nextVideo();
    setTimeout(() => { wheelCooldown = false; }, 800);
  }, { passive: true });

  feed.addEventListener('click', e => {
    if (e.target.closest('.btn') || e.target.closest('.nav-arrow') || e.target.closest('.video-info')) return;
    if (currentVideo) currentVideo.paused ? currentVideo.play() : currentVideo.pause();
  });

  updateMuteBadge();
  nextVideo();
</script>
</body>
</html>
